name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --locked

      - name: Create test environment file
        run: |
          echo "DISCORD_TOKEN=fake-token-for-ci" > .env
          echo "DEV_GUILD_ID=0" >> .env
          echo "SYNC_GLOBAL_COMMANDS=false" >> .env
          echo "DB_PATH=/tmp/day_one_test.db" >> .env
          echo "LOG_LEVEL=INFO" >> .env
          echo "DISCORD_LOG_CHANNEL_ID=0" >> .env
          echo "ADMIN_ROLES=" >> .env
          echo "DEV_USER_IDS=" >> .env

      - name: Run tests
        run: uv run pytest

  deploy:
    runs-on: ubuntu-latest
    needs: test

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to Oracle
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ORACLE_SSH_KEY }}" > ~/.ssh/oracle_key
          chmod 600 ~/.ssh/oracle_key

          ssh-keyscan -H "${{ secrets.ORACLE_HOST }}" >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/oracle_key "${{ secrets.ORACLE_USER }}@${{ secrets.ORACLE_HOST }}" '
            cd ~/Day-One &&
            git pull &&
            docker compose up -d --build &&
            docker image prune -f
          '